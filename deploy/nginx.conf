# Gateway: the single public entry point on 10.1.0.4.
#   /api/<svc>/*  → the matching backend service (prefix stripped, matching the
#                   dev next.config.ts rewrites so backends see paths like /login)
#   everything else → the Next.js server (web:3000)
#
# The Docker embedded DNS resolver (127.0.0.11) + a variable in proxy_pass make
# nginx resolve service names at request time, so a backend restarting with a
# new container IP does not require an nginx reload.
worker_processes auto;
events { worker_connections 1024; }

http {
    resolver 127.0.0.11 valid=30s ipv6=off;
    client_max_body_size 50m;

    proxy_http_version 1.1;
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # SSE: the assist chat streams tokens — never buffer, allow long-lived reads.
    proxy_read_timeout 600s;
    proxy_send_timeout 600s;

    server {
        listen 80;

        location /api/data/        { set $u http://data:8000;         rewrite ^/api/data/(.*)$        /$1 break; proxy_pass $u; proxy_buffering off; }
        location /api/pipeline/    { set $u http://pipeline:8001;     rewrite ^/api/pipeline/(.*)$    /$1 break; proxy_pass $u; proxy_buffering off; }
        location /api/ontology/    { set $u http://ontology:8003;     rewrite ^/api/ontology/(.*)$    /$1 break; proxy_pass $u; proxy_buffering off; }
        location /api/governance/  { set $u http://governance:8004;   rewrite ^/api/governance/(.*)$  /$1 break; proxy_pass $u; proxy_buffering off; }
        location /api/auth/        { set $u http://auth:8005;         rewrite ^/api/auth/(.*)$        /$1 break; proxy_pass $u; proxy_buffering off; }
        location /api/assist/      { set $u http://assist:8006;       rewrite ^/api/assist/(.*)$      /$1 break; proxy_pass $u; proxy_buffering off; }
        location /api/analysis/    { set $u http://analysis:8008;     rewrite ^/api/analysis/(.*)$    /$1 break; proxy_pass $u; proxy_buffering off; }
        location /api/app-builder/ { set $u http://app-builder:8002;  rewrite ^/api/app-builder/(.*)$ /$1 break; proxy_pass $u; proxy_buffering off; }

        # Next.js app (SSR shell + client bundles + HMR-less prod assets).
        location / {
            set $web http://web:3000;
            proxy_pass $web;
            proxy_set_header Upgrade    $http_upgrade;
            proxy_set_header Connection "upgrade";
        }
    }
}
