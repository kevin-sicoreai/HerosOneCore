        sql: customer_id
        type: number
      - name: sales_rep_id
        sql: sales_rep_id
        type: number
      - name: order_date
        sql: order_date
        type: time
      - name: status
        sql: status
        type: string
      - name: item_count
        sql: item_count
        type: number

    measures:
