# Generated from ontology object type 'training_record'. Do not edit by hand —
# regenerate with `python -m app.tools.generate_cube_schema`.
cubes:
  - name: training_record
    sql: SELECT * FROM read_parquet('/data/raw/training_records.parquet')

    joins:
      - name: employee
        sql: "{CUBE}.employee_id = {employee}.id"
        relationship: many_to_one

    dimensions:
      - name: id
        sql: id
        type: number
        primary_key: true
      - name: employee_id
        sql: employee_id
        type: number
      - name: training_id
        sql: training_id
        type: number
      - name: completed_at
        sql: completed_at
        type: time
      - name: hours
        sql: hours
        type: number
      - name: result
        sql: result
        type: string

    measures:
      - name: hr_training_count
        title: 培训人次
        type: count
      - name: hr_training_count_matched
        title: 培训人次·命中行数
        type: count
